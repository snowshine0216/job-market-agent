name: testerhome
base_url: https://testerhome.com
listing:
  url_template: "{base_url}/jobs?page={page}"
  list_item_selector: ".topics .topic"
  title_selector: ".title a"
  href_attr: "href"
  posted_at_attr: ".time@title"
detail:
  body_selector: ".topic-detail .markdown-body"
  enabled: false                  # opt-in: flip via --with-detail CLI flag
  company_selectors:
    - ".topic-detail .markdown-body"   # root for the child-element scan (Task 3)
  company_label_patterns:
    - "公司[:：]\\s*(?P<value>[^\\n<]+)"
    - "公司名称[:：]\\s*(?P<value>[^\\n<]+)"
    - "招聘公司[:：]\\s*(?P<value>[^\\n<]+)"
  salary_selectors:
    - ".topic-detail .markdown-body"
  salary_label_patterns:
    - "薪资[:：]\\s*(?P<value>[^\\n<]+)"
    - "薪资范围[:：]\\s*(?P<value>[^\\n<]+)"
    - "工资[:：]\\s*(?P<value>[^\\n<]+)"
requires_browser: false
content_block_markers: []
known_good_list_selector: ".topics .topic"
rate:
  delay_ms: 800
  max_retries: 3
  backoff_base_s: 2
